<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>元気になるEC - 地下アイドルグッズ販売</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          'Segoe UI',
          Tahoma,
          Geneva,
          Verdana,
          sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      header {
        text-align: center;
        color: white;
        margin-bottom: 40px;
        padding: 20px 0;
      }

      header h1 {
        font-size: 48px;
        margin-bottom: 10px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      }

      header p {
        font-size: 18px;
        opacity: 0.9;
      }

      .event-buttons {
        display: flex;
        gap: 20px;
        justify-content: center;
        margin-bottom: 40px;
        flex-wrap: wrap;
      }

      .event-btn {
        padding: 15px 30px;
        font-size: 16px;
        font-weight: bold;
        color: white;
        border: 2px solid white;
        background-color: rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        cursor: pointer;
        transition:
          all 0.3s ease,
          transform 0.2s ease;
      }

      .event-btn:hover {
        background-color: rgba(255, 255, 255, 0.4);
        transform: translateY(-2px);
      }

      .event-btn.active {
        background-color: white;
        color: #667eea;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }

      .content {
        background: white;
        border-radius: 15px;
        padding: 40px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      }

      .event-title {
        font-size: 32px;
        color: #667eea;
        margin-bottom: 10px;
        text-align: center;
      }

      .event-description {
        text-align: center;
        color: #666;
        margin-bottom: 30px;
        font-size: 16px;
      }

      .goods-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
        margin-top: 30px;
      }

      .goods-card {
        background: #f8f9fa;
        border-radius: 10px;
        padding: 15px;
        text-align: center;
        border: 2px solid #e9ecef;
        transition:
          all 0.3s ease,
          transform 0.2s ease;
      }

      .goods-card:hover {
        border-color: #667eea;
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        transform: translateY(-4px);
      }

      .goods-image {
        width: 100%;
        height: 180px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 48px;
        margin-bottom: 10px;
      }

      .goods-name {
        font-size: 16px;
        font-weight: bold;
        color: #333;
        margin-bottom: 8px;
      }

      .goods-price {
        font-size: 18px;
        color: #667eea;
        font-weight: bold;
        margin-bottom: 10px;
      }

      .add-to-cart-btn {
        width: 100%;
        padding: 10px;
        background-color: #667eea;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        transition:
          background-color 0.3s ease,
          transform 0.2s ease;
      }

      .add-to-cart-btn:hover {
        background-color: #764ba2;
        transform: scale(1.05);
      }

      .add-to-cart-btn:active {
        transform: scale(0.95);
      }

      .cart-info {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        z-index: 100;
        min-width: 250px;
      }

      .cart-title {
        font-size: 18px;
        font-weight: bold;
        color: #333;
        margin-bottom: 10px;
      }

      .cart-items {
        font-size: 14px;
        color: #666;
        line-height: 1.6;
        max-height: 200px;
        overflow-y: auto;
      }

      .cart-total {
        margin-top: 10px;
        padding-top: 10px;
        border-top: 2px solid #e9ecef;
        font-size: 16px;
        font-weight: bold;
        color: #667eea;
      }

      .no-items {
        color: #999;
        font-style: italic;
      }

      @media (max-width: 768px) {
        header h1 {
          font-size: 32px;
        }

        .event-buttons {
          gap: 10px;
        }

        .event-btn {
          padding: 12px 20px;
          font-size: 14px;
        }

        .goods-grid {
          grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
          gap: 15px;
        }

        .cart-info {
          bottom: 10px;
          right: 10px;
          min-width: 200px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>🎤 元気になるEC</h1>
        <p>地下アイドルの推し活応援グッズ販売</p>
      </header>

      <div class="event-buttons">
        <button class="event-btn active" data-event="0">
          🎪 ライブイベント
        </button>
        <button class="event-btn" data-event="1">
          🎉 ファンミーティング
        </button>
        <button class="event-btn" data-event="2">
          🏪 グッズ販売展
        </button>
      </div>

      <div class="content">
        <div class="event-title" id="eventTitle">ライブイベント</div>
        <div class="event-description" id="eventDescription">
          推し活の最高の瞬間をグッズで応援しよう！
        </div>
        <div class="goods-grid" id="goodsGrid"></div>
      </div>
    </div>

    <div class="cart-info">
      <div class="cart-title">🛒 カート</div>
      <div class="cart-items" id="cartItems">
        <div class="no-items">まだアイテムがありません</div>
      </div>
      <div class="cart-total" id="cartTotal"></div>
    </div>

    <script type="module">
      import { ECSite } from './dist/ec-site.js';

      const ecSite = new ECSite();
      ecSite.init();
    </script>
  </body>
</html>
