<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元気EC - 地下アイドル グッズ販売</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        background: white;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        overflow: hidden;
      }

      .header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 30px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .header h1 {
        font-size: 2rem;
        font-weight: bold;
      }

      .nav-buttons {
        display: flex;
        gap: 15px;
      }

      .nav-btn {
        background: rgba(255, 255, 255, 0.2);
        color: white;
        border: 2px solid white;
        padding: 10px 20px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        transition: all 0.3s ease;
      }

      .nav-btn:hover {
        background: white;
        color: #667eea;
      }

      .nav-btn.cart-btn {
        position: relative;
      }

      .cart-count {
        position: absolute;
        top: -8px;
        right: -8px;
        background: #ff6b6b;
        color: white;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: bold;
      }

      .content {
        padding: 40px;
      }

      /* ===== ホーム画面 ===== */
      .events-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }

      .event-card {
        background: white;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        padding: 20px;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .event-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        border-color: #667eea;
      }

      .event-card h3 {
        color: #667eea;
        margin-bottom: 10px;
        font-size: 1.2rem;
      }

      .event-card p {
        color: #666;
        margin: 8px 0;
        font-size: 0.9rem;
      }

      .event-card .date {
        color: #ff6b6b;
        font-weight: bold;
        margin-top: 10px;
      }

      /* ===== 商品グリッド ===== */
      .products-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 20px;
      }

      .product-card {
        background: white;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        overflow: hidden;
        transition: all 0.3s ease;
      }

      .product-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        border-color: #667eea;
      }

      .product-image {
        width: 100%;
        height: 200px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 3rem;
      }

      .product-info {
        padding: 15px;
      }

      .product-info h3 {
        color: #667eea;
        margin-bottom: 8px;
        font-size: 1rem;
      }

      .product-info p {
        color: #666;
        margin: 5px 0;
        font-size: 0.85rem;
      }

      .product-price {
        color: #ff6b6b;
        font-size: 1.3rem;
        font-weight: bold;
        margin: 10px 0;
      }

      .product-stock {
        color: #888;
        font-size: 0.85rem;
        margin: 5px 0;
      }

      .add-to-cart-btn {
        width: 100%;
        background: #667eea;
        color: white;
        border: none;
        padding: 10px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        transition: background 0.3s ease;
        margin-top: 10px;
      }

      .add-to-cart-btn:hover {
        background: #764ba2;
      }

      .add-to-cart-btn:disabled {
        background: #ccc;
        cursor: not-allowed;
      }

      /* ===== カート画面 ===== */
      .cart-container {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 30px;
      }

      .cart-items {
        background: #f9f9f9;
        border-radius: 8px;
        padding: 20px;
      }

      .cart-item {
        background: white;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
        padding: 15px;
        margin-bottom: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .cart-item-info h4 {
        color: #667eea;
        margin-bottom: 5px;
      }

      .cart-item-info p {
        color: #666;
        font-size: 0.9rem;
      }

      .cart-item-controls {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .quantity-input {
        width: 70px;
        padding: 8px;
        border: 1px solid #e0e0e0;
        border-radius: 4px;
        text-align: center;
      }

      .remove-btn {
        background: #ff6b6b;
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
      }

      .remove-btn:hover {
        background: #d63031;
      }

      .cart-summary {
        background: white;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        padding: 20px;
        height: fit-content;
      }

      .cart-summary h3 {
        color: #667eea;
        margin-bottom: 15px;
      }

      .summary-line {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        padding-bottom: 10px;
        border-bottom: 1px solid #e0e0e0;
      }

      .summary-line.total {
        font-size: 1.3rem;
        font-weight: bold;
        color: #ff6b6b;
        margin-top: 15px;
        border-bottom: 2px solid #667eea;
      }

      .checkout-btn {
        width: 100%;
        background: #667eea;
        color: white;
        border: none;
        padding: 15px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        font-size: 1rem;
        margin-top: 15px;
        transition: background 0.3s ease;
      }

      .checkout-btn:hover {
        background: #764ba2;
      }

      /* ===== フォーム ===== */
      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-weight: bold;
      }

      .form-group input {
        width: 100%;
        padding: 12px;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
        font-size: 1rem;
      }

      .form-group input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
      }

      .form-container {
        max-width: 500px;
        margin: 0 auto;
        background: #f9f9f9;
        padding: 30px;
        border-radius: 8px;
      }

      .form-container h2 {
        color: #667eea;
        margin-bottom: 20px;
        text-align: center;
      }

      .submit-btn {
        width: 100%;
        background: #667eea;
        color: white;
        border: none;
        padding: 15px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        font-size: 1rem;
        transition: background 0.3s ease;
      }

      .submit-btn:hover {
        background: #764ba2;
      }

      /* ===== 完了画面 ===== */
      .completion-container {
        text-align: center;
        padding: 60px 40px;
      }

      .completion-icon {
        font-size: 4rem;
        color: #51cf66;
        margin-bottom: 20px;
      }

      .completion-container h2 {
        color: #333;
        margin-bottom: 10px;
        font-size: 2rem;
      }

      .completion-container p {
        color: #666;
        margin: 10px 0;
        font-size: 1.1rem;
      }

      .order-number {
        background: #f0f0f0;
        padding: 15px 25px;
        border-radius: 6px;
        margin: 20px 0;
        font-weight: bold;
        color: #667eea;
      }

      /* ===== 注文履歴 ===== */
      .orders-table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .orders-table th {
        background: #667eea;
        color: white;
        padding: 15px;
        text-align: left;
        font-weight: bold;
      }

      .orders-table td {
        padding: 15px;
        border-bottom: 1px solid #e0e0e0;
      }

      .orders-table tbody tr:hover {
        background: #f9f9f9;
      }

      .screen {
        display: none;
      }

      .screen.active {
        display: block;
        animation: fadeIn 0.3s ease-in-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .empty-message {
        text-align: center;
        color: #999;
        padding: 40px;
        font-size: 1.1rem;
      }

      .back-btn {
        background: #999;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        margin-top: 20px;
      }

      .back-btn:hover {
        background: #666;
      }

      .error-message {
        background: #ffe0e0;
        color: #d63031;
        padding: 15px;
        border-radius: 6px;
        margin-bottom: 20px;
        border-left: 4px solid #d63031;
      }

      .breadcrumb {
        color: #999;
        margin-bottom: 20px;
        font-size: 0.9rem;
      }

      .breadcrumb span {
        cursor: pointer;
        color: #667eea;
      }

      .breadcrumb span:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- ===== ヘッダー ===== -->
      <div class="header">
        <h1>🎤 元気EC - グッズ販売</h1>
        <div class="nav-buttons">
          <button class="nav-btn" id="homeBtn">🏠 ホーム</button>
          <button class="nav-btn cart-btn" id="cartBtn">
            🛒 カート
            <span class="cart-count" id="cartCount">0</span>
          </button>
          <button class="nav-btn" id="ordersBtn">📝 注文履歴</button>
        </div>
      </div>

      <!-- ===== メインコンテンツ ===== -->
      <div class="content">
        <!-- ===== ホーム画面 ===== -->
        <div class="screen active" id="homeScreen">
          <h2>イベント一覧</h2>
          <div class="events-grid" id="eventsGrid"></div>
        </div>

        <!-- ===== 商品一覧画面 ===== -->
        <div class="screen" id="productsScreen">
          <div class="breadcrumb">
            <span id="backToEventsBtn">イベント一覧</span> &gt; <span id="currentEventName"></span>
          </div>
          <h2 id="productsTitle">商品一覧</h2>
          <div class="products-grid" id="productsGrid"></div>
        </div>

        <!-- ===== 商品詳細画面 ===== -->
        <div class="screen" id="productDetailScreen">
          <div class="breadcrumb">
            <span id="backToProductsBtn">商品一覧</span> &gt; <span id="detailProductName"></span>
          </div>
          <div id="productDetailContent"></div>
        </div>

        <!-- ===== カート画面 ===== -->
        <div class="screen" id="cartScreen">
          <h2>ショッピングカート</h2>
          <div id="cartContent"></div>
        </div>

        <!-- ===== 購入情報入力画面 ===== -->
        <div class="screen" id="checkoutScreen">
          <div class="form-container">
            <h2>購入者情報</h2>
            <div id="checkoutError"></div>
            <form id="checkoutForm">
              <div class="form-group">
                <label for="customerName">お名前 *</label>
                <input type="text" id="customerName" name="customerName" required>
              </div>
              <div class="form-group">
                <label for="customerEmail">メールアドレス *</label>
                <input type="email" id="customerEmail" name="customerEmail" required>
              </div>
              <div class="form-group">
                <label for="customerPhone">電話番号 *</label>
                <input type="tel" id="customerPhone" name="customerPhone" required>
              </div>
              <p style="color: #666; margin-bottom: 20px; text-align: center;">
                合計金額: <span id="checkoutTotal" style="font-weight: bold; color: #ff6b6b; font-size: 1.2rem;">¥0</span>
              </p>
              <button type="submit" class="submit-btn">注文を確定する</button>
            </form>
            <button class="back-btn" id="backToCartBtn">カートに戻る</button>
          </div>
        </div>

        <!-- ===== 購入完了画面 ===== -->
        <div class="screen" id="completionScreen">
          <div class="completion-container">
            <div class="completion-icon">✅</div>
            <h2>ご購入ありがとうございました。</h2>
            <p>ご注文が確定いたしました。</p>
            <div class="order-number">
              注文番号: <span id="orderNumber"></span>
            </div>
            <p style="color: #666; margin-top: 20px;">
              注文内容確認メールをお送りしました。<br>
              ご確認ください。
            </p>
            <button class="back-btn" id="backToHomeBtn" style="margin-top: 30px;">ホームに戻る</button>
          </div>
        </div>

        <!-- ===== 注文履歴画面 ===== -->
        <div class="screen" id="ordersScreen">
          <h2>注文履歴</h2>
          <div id="ordersContent"></div>
        </div>
      </div>
    </div>

    <!-- コンパイル済みメインロジック -->
    <script type="module" src="dist/ec-site.js"></script>
  </body>
</html>
